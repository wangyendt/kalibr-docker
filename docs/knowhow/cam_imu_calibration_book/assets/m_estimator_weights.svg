<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" role="img" aria-labelledby="title desc">
  <title id="title">M-estimator weight curves</title>
  <desc id="desc">Illustrative robust M-estimator weights as a function of squared Mahalanobis error.</desc>
  <rect width="760" height="440" fill="#ffffff"/>
  <line x1="80" y1="360" x2="700" y2="360" stroke="#222" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="80" y2="60" stroke="#222" stroke-width="1.5"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333">
    <text x="382" y="414" text-anchor="middle">s = e^T Omega e</text>
    <text x="27" y="214" text-anchor="middle" transform="rotate(-90 27 214)">weight w(s)</text>
    <text x="80" y="382" text-anchor="middle">0</text>
    <text x="204" y="382" text-anchor="middle">2</text>
    <text x="328" y="382" text-anchor="middle">4</text>
    <text x="452" y="382" text-anchor="middle">6</text>
    <text x="576" y="382" text-anchor="middle">8</text>
    <text x="700" y="382" text-anchor="middle">10</text>
    <text x="63" y="365" text-anchor="end">0</text>
    <text x="63" y="215" text-anchor="end">0.5</text>
    <text x="63" y="65" text-anchor="end">1</text>
  </g>
  <g stroke="#e6e6e6" stroke-width="1">
    <line x1="204" y1="60" x2="204" y2="360"/>
    <line x1="328" y1="60" x2="328" y2="360"/>
    <line x1="452" y1="60" x2="452" y2="360"/>
    <line x1="576" y1="60" x2="576" y2="360"/>
    <line x1="700" y1="60" x2="700" y2="360"/>
    <line x1="80" y1="210" x2="700" y2="210"/>
    <line x1="80" y1="60" x2="700" y2="60"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <polyline stroke="#777777" points="80,60 700,60"/>
    <polyline stroke="#0072b2" points="80,60 142,120 204,160 328,210 452,240 576,260 700,274.3"/>
    <polyline stroke="#009e73" points="80,60 142,60 204,60 328,60 452,115.1 576,147.9 700,170.3"/>
    <polyline stroke="#d55e00" points="80,60 142,285 204,326.7 328,348 452,354 576,356.3 700,357.5"/>
    <polyline stroke="#cc79a7" points="80,65.9 142,75.6 204,98.7 266,146.1 328,216.6 390,284.4 452,327.1 576,355.2 700,359.4"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#222">
    <rect x="500" y="86" width="188" height="126" rx="6" fill="#fff" stroke="#ddd"/>
    <line x1="518" y1="108" x2="558" y2="108" stroke="#777777" stroke-width="3"/>
    <text x="568" y="113">NoMEstimator</text>
    <line x1="518" y1="132" x2="558" y2="132" stroke="#0072b2" stroke-width="3"/>
    <text x="568" y="137">Cauchy</text>
    <line x1="518" y1="156" x2="558" y2="156" stroke="#009e73" stroke-width="3"/>
    <text x="568" y="161">Huber</text>
    <line x1="518" y1="180" x2="558" y2="180" stroke="#d55e00" stroke-width="3"/>
    <text x="568" y="185">Geman-McClure</text>
    <line x1="518" y1="204" x2="558" y2="204" stroke="#cc79a7" stroke-width="3"/>
    <text x="568" y="209">Blake-Zisserman</text>
  </g>
</svg>
