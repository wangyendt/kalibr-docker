name: DockerHub Camera Calibration Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub-camera-calibration.yml"
      - "docker/camera-calibration/**"
      - "tools/camera_calibration/**"
      - "Schweizer-Messer/**"
      - "aslam_cv/**"
      - "aslam_incremental_calibration/**"
      - "aslam_nonparametric_estimation/**"
      - "aslam_offline_calibration/**"
      - "aslam_optimizer/**"
      - "catkin_simple/**"
      - "opencv2_catkin/**"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub-camera-calibration.yml"
      - "docker/camera-calibration/**"
      - "tools/camera_calibration/**"
      - "Schweizer-Messer/**"
      - "aslam_cv/**"
      - "aslam_incremental_calibration/**"
      - "aslam_nonparametric_estimation/**"
      - "aslam_offline_calibration/**"
      - "aslam_optimizer/**"
      - "catkin_simple/**"
      - "opencv2_catkin/**"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the built image to DockerHub"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: dockerhub-camera-calibration-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wang121ye/kalibr-camera-calibration' }}

jobs:
  build:
    # Build each architecture natively on its own runner, then push by digest
    # (no tag yet) so the merge job can assemble a single multi-arch manifest.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
            base_image: osrf/ros:noetic-desktop-full
            apt_mirror_host: ""
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
            base_image: arm64v8/ros:noetic-perception
            apt_mirror_host: ""
    runs-on: ${{ matrix.runner }}
    outputs:
      publish: ${{ steps.settings.outputs.publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Select build settings
        id: settings
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DISPATCH_PUSH_IMAGE: ${{ inputs.push_image || false }}
        run: |
          set -euo pipefail

          publish=false
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_PUSH_IMAGE}" == "true" ]]; then
            publish=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
            publish=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            publish=true
          fi

          {
            echo "publish=${publish}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}

      - name: Login to DockerHub
        if: steps.settings.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/camera-calibration/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE_PLATFORM=${{ matrix.platform }}
            BASE_IMAGE=${{ matrix.base_image }}
            APT_MIRROR_HOST=${{ matrix.apt_mirror_host }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: ${{ steps.settings.outputs.publish == 'true' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.DOCKERHUB_IMAGE) || 'type=cacheonly' }}
          cache-from: type=gha,scope=camera-calibration-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=camera-calibration-${{ matrix.arch }}

      - name: Export digest
        if: steps.settings.outputs.publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.settings.outputs.publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    # Combine the per-architecture digests into one multi-arch manifest and tag it.
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.publish == 'true'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=20.04,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf "${DOCKERHUB_IMAGE}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:${{ steps.meta.outputs.version }}"
