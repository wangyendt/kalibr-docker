name: DockerHub Camera Calibration Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub-camera-calibration.yml"
      - "docker/camera-calibration/**"
      - "tools/camera_calibration/**"
      - "Schweizer-Messer/**"
      - "aslam_cv/**"
      - "aslam_incremental_calibration/**"
      - "aslam_nonparametric_estimation/**"
      - "aslam_offline_calibration/**"
      - "aslam_optimizer/**"
      - "catkin_simple/**"
      - "opencv2_catkin/**"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/dockerhub-camera-calibration.yml"
      - "docker/camera-calibration/**"
      - "tools/camera_calibration/**"
      - "Schweizer-Messer/**"
      - "aslam_cv/**"
      - "aslam_incremental_calibration/**"
      - "aslam_nonparametric_estimation/**"
      - "aslam_offline_calibration/**"
      - "aslam_optimizer/**"
      - "catkin_simple/**"
      - "opencv2_catkin/**"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the built image to DockerHub"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: dockerhub-camera-calibration-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wang121ye/kalibr-camera-calibration' }}
  DOCKER_BUILD_PLATFORM: ${{ vars.DOCKER_BUILD_PLATFORM || 'linux/amd64' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Select build settings
        id: settings
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DISPATCH_PUSH_IMAGE: ${{ inputs.push_image || false }}
        run: |
          set -euo pipefail

          publish=false
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_PUSH_IMAGE}" == "true" ]]; then
            publish=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
            publish=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            publish=true
          fi

          {
            echo "publish=${publish}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=20.04,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to DockerHub
        if: steps.settings.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/camera-calibration/Dockerfile
          platforms: ${{ env.DOCKER_BUILD_PLATFORM }}
          build-args: |
            BASE_IMAGE_PLATFORM=${{ env.DOCKER_BUILD_PLATFORM }}
          push: ${{ steps.settings.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=camera-calibration
          cache-to: type=gha,mode=max,scope=camera-calibration
